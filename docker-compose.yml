services:
  api:
    build: .
    container_name: global-waste-intelligence-api
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    build: .
    container_name: global-waste-intelligence-dashboard
    env_file:
      - .env.example
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    volumes:
      - ./:/app
    depends_on:
      - api
    command: streamlit run frontend/streamlit_app.py --server.address 0.0.0.0 --server.port 8501

